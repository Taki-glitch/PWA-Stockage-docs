<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DocVault</title>

  <meta name="theme-color" content="#2563eb">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      📁 DocVault
    </div>

    <nav>

      <button class="nav-btn active">
        📄 Documents
      </button>

      <button class="nav-btn">
        ⭐ Favoris
      </button>

      <button class="nav-btn">
        📦 Archives
      </button>

    </nav>

    <div class="sidebar-footer">

      <button id="themeToggle" class="nav-btn">
        🌙 Mode sombre
      </button>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="main-content">

    <!-- HEADER -->

    <header class="topbar">

      <input
        type="text"
        id="searchInput"
        placeholder="🔍 Rechercher un document..."
      >

      <label class="upload-btn">
        ➕ Ajouter

        <input
          hidden
          type="file"
          id="fileInput"
          accept=".pdf,image/*"
        >
      </label>

    </header>

    <!-- DASHBOARD -->

    <section class="dashboard">

      <div class="stat-card">
        <div class="stat-value" id="documentsCount">0</div>
        <div class="stat-label">Documents</div>
      </div>

      <div class="stat-card">
        <div class="stat-value" id="favoritesCount">0</div>
        <div class="stat-label">Favoris</div>
      </div>

      <div class="stat-card">
        <div class="stat-value" id="archivesCount">0</div>
        <div class="stat-label">Archives</div>
      </div>

    </section>

    <!-- FILTERS -->

    <section class="filters">

      <select id="categoryFilter">

        <option value="">
          Toutes les catégories
        </option>

      </select>

      <button id="showFavorites">
        ⭐ Favoris
      </button>

      <button id="showArchives">
        📦 Archives
      </button>

    </section>

    <!-- DOCUMENT LIST -->

    <section
      id="documentsList"
      class="documents-list"
    >

      <div class="empty-state">

        <div class="empty-icon">
          📂
        </div>

        <h2>
          Aucun document
        </h2>

        <p>
          Ajoutez votre premier document.
        </p>

      </div>

    </section>

  </main>

</div>

<!-- DOCUMENT EDITOR -->

<dialog id="documentModal">

  <div class="modal-header">

    <h2 id="modalTitle">
      Document
    </h2>

    <button
      id="closeModal"
      class="icon-btn"
    >
      ✕
    </button>

  </div>

  <div class="modal-body">

    <label>

      Titre

      <input
        type="text"
        id="editTitle"
      >

    </label>

    <label>

      Catégorie

      <input
        type="text"
        id="editCategory"
        placeholder="Administratif"
      >

    </label>

    <label>

      Tags

      <input
        type="text"
        id="editTags"
        placeholder="important, voiture"
      >

    </label>

    <label>

      Résumé

      <textarea
        id="editSummary"
        rows="4"
      ></textarea>

    </label>

    <label>

      Notes

      <textarea
        id="editNotes"
        rows="6"
      ></textarea>

    </label>

    <div class="checkbox-row">

      <label>

        <input
          type="checkbox"
          id="editFavorite"
        >

        Favori

      </label>

      <label>

        <input
          type="checkbox"
          id="editArchived"
        >

        Archivé

      </label>

    </div>

    <div class="modal-actions">

      <button id="saveDocumentBtn">
        💾 Enregistrer
      </button>

      <button id="openDocumentBtn">
        📄 Ouvrir
      </button>

      <button
        id="deleteDocumentBtn"
        class="danger"
      >
        🗑 Supprimer
      </button>

    </div>

  </div>

</dialog>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
