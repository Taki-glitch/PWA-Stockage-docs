<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocVault</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h1>📁 DocVault</h1>

    <button class="nav" data-view="all">📄 Documents</button>
    <button class="nav" data-view="favorites">⭐ Favoris</button>
    <button class="nav" data-view="archives">📦 Archives</button>
    <button class="nav" data-view="due">📅 Échéances</button>

    <hr>

    <button id="themeToggle">🌙 Mode</button>
    <button id="exportBtn">📤 Export</button>
    <label class="import">
      📥 Import
      <input type="file" id="importInput" hidden>
    </label>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <header>
      <input id="search" placeholder="Rechercher...">
      <input type="file" id="fileInput" multiple>
    </header>

    <section id="stats"></section>

    <section id="list"></section>

  </main>

</div>

<!-- MODAL -->
<dialog id="modal">

  <h2 id="mTitle"></h2>

  <input id="mCategory" placeholder="Catégorie">
  <input id="mTags" placeholder="tags (virgule)">
  <textarea id="mSummary" placeholder="Résumé"></textarea>
  <textarea id="mNotes" placeholder="Notes"></textarea>

  <input type="date" id="mDue">

  <label>
    ⭐ Favori <input type="checkbox" id="mFav">
  </label>

  <label>
    📦 Archive <input type="checkbox" id="mArch">
  </label>

  <div id="mLinks"></div>

  <button id="save">Sauvegarder</button>
  <button id="open">Ouvrir</button>
  <button id="delete">Supprimer</button>

</dialog>

<script src="db.js"></script>
<script src="search.js"></script>
<script src="app.js"></script>

</body>
</html>
