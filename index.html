<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>DocVault</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="layout">
    <aside class="sidebar" aria-label="Navigation principale">
      <div>
        <p class="eyebrow">Offline workspace</p>
        <h1>📁 DocVault</h1>
      </div>

      <nav class="nav-list">
        <button class="nav active" data-view="all">📄 Documents</button>
        <button class="nav" data-view="favorites">⭐ Favoris</button>
        <button class="nav" data-view="archives">📦 Archives</button>
        <button class="nav" data-view="due">📅 Échéances</button>
      </nav>

      <section class="sidebar-panel">
        <h2>Collections</h2>
        <div id="categoryList" class="chip-list"></div>
      </section>

      <section class="sidebar-panel">
        <h2>Tags</h2>
        <div id="tagList" class="chip-list"></div>
      </section>

      <div class="sidebar-actions">
        <button id="themeToggle" type="button">🌙 Mode sombre</button>
        <button id="exportBtn" type="button">📤 Export JSON</button>
        <label class="button-like import">
          📥 Import JSON
          <input type="file" id="importInput" accept="application/json" hidden />
        </label>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Coffre documentaire privé</p>
          <h2 id="viewTitle">Tous les documents</h2>
        </div>
        <label class="button-like primary">
          + Importer fichiers
          <input type="file" id="fileInput" multiple hidden />
        </label>
      </header>

      <section class="search-row" aria-label="Recherche globale">
        <input id="search" type="search" placeholder="Rechercher titre, catégorie, tags, notes, résumé..." autocomplete="off" />
      </section>

      <section id="stats" class="stats-grid" aria-label="Dashboard"></section>
      <section id="dueSoon" class="due-panel" aria-label="Échéances proches"></section>
      <section id="list" class="document-grid" aria-live="polite"></section>
    </main>
  </div>

  <dialog id="modal" class="document-modal">
    <form method="dialog" class="modal-head">
      <div>
        <p class="eyebrow">Fiche document</p>
        <h2 id="mTitle"></h2>
      </div>
      <button class="icon-button" value="cancel" aria-label="Fermer">✕</button>
    </form>

    <div class="modal-body">
      <section class="field-grid">
        <label>Catégorie
          <input id="mCategory" placeholder="Administratif" />
        </label>
        <label>Tags
          <input id="mTags" placeholder="voiture, important" />
        </label>
        <label>Échéance
          <input type="date" id="mDue" />
        </label>
        <div class="toggle-row">
          <label>⭐ Favori <input type="checkbox" id="mFav" /></label>
          <label>📦 Archive <input type="checkbox" id="mArch" /></label>
        </div>
      </section>

      <label>Résumé
        <textarea id="mSummary" placeholder="Résumé court du document"></textarea>
      </label>

      <label>Notes classiques
        <textarea id="mNotes" placeholder="Notes libres recherchables"></textarea>
      </label>

      <section class="block-editor">
        <div class="section-title">
          <h3>Éditeur Notion léger</h3>
          <button id="addBlock" type="button">+ Bloc</button>
        </div>
        <div id="blocks"></div>
      </section>

      <section>
        <div class="section-title">
          <h3>Relations</h3>
          <span>Documents liés pour navigation graphe</span>
        </div>
        <div id="mLinks" class="relation-list"></div>
      </section>
    </div>

    <menu class="modal-actions">
      <button id="save" type="button" class="primary">Sauvegarder</button>
      <button id="openFile" type="button">Ouvrir</button>
      <button id="deleteDoc" type="button" class="danger">Supprimer</button>
    </menu>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
